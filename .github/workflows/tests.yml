name: Tests
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    name: Tests
    strategy:
      fail-fast: false
      matrix:
        ruby: ["2.7", "3.0", "3.1", "3.2", "3.3", "3.4", "4.0"]
    runs-on: ubuntu-latest
    env:
      FERRUM_PROCESS_TIMEOUT: 25
      FERRUM_DEFAULT_TIMEOUT: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - id: setup-chrome
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable
      - run: ${{ steps.setup-chrome.outputs.chrome-path }} --version

      - name: Fix GA Chrome Permissions
        run: |
          sudo chown root:root ${{ steps.setup-chrome.outputs.chrome-path }}
          sudo chmod 4755 ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Run tests
        env:
          BROWSER_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          NO_SANDBOX: "true"
        run: |
          mkdir -p /tmp/cuprite
          bundle exec rake

      - name: Archive artifacts
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: artifacts-ruby-v${{ matrix.ruby }}
          path: /tmp/cuprite/
